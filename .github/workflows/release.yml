name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    name: Build Debian packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc make \
            debhelper devscripts \
            qemu-user-static binfmt-support

      - name: Install arm64 cross-compilation deps
        if: matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libevdev-dev:arm64

      - name: Install amd64 deps
        if: matrix.arch == 'amd64'
        run: |
          sudo apt-get install -y libevdev-dev

      - name: Build package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi
          dpkg-buildpackage -us -uc -b --host-arch ${{ matrix.arch }}
          mkdir -p dist
          mv ../*.deb dist/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/*.deb

  build-rpm:
    name: Build RPM packages
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y gcc make libevdev-devel rpm-build rpmdevtools \
            createrepo_c qemu-user-static

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Build RPM
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf ~/rpmbuild/SOURCES/debounced-${VERSION}.tar.gz \
            --transform "s,^,debounced-${VERSION}/," \
            src/ man/ Makefile debounced.service LICENSE
          rpmbuild -bb \
            --target ${{ matrix.arch }} \
            rpm/debounced.spec
          mkdir -p dist
          mv ~/rpmbuild/RPMS/${{ matrix.arch }}/*.rpm dist/

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: dist/*.rpm

  release:
    name: Create release and update dist repo
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Checkout dist repo
        uses: actions/checkout@v4
        with:
          repository: VillageOfGamers/key-debouncer-dist
          token: ${{ secrets.DIST_REPO_TOKEN }}
          path: dist-repo

      - name: Install repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro createrepo-c

      - name: Update apt repo
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for arch in amd64 arm64; do
            reprepro --basedir dist-repo/apt includedeb stable \
              artifacts/deb-${arch}/*.deb
          done

      - name: Update RPM repo
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for arch in x86_64 aarch64; do
            cp artifacts/rpm-${arch}/*.rpm dist-repo/rpm/${arch}/
            createrepo_c --update dist-repo/rpm/${arch}/
            gpg --batch --yes --detach-sign --armor \
              dist-repo/rpm/${arch}/repodata/repomd.xml
          done

      - name: Commit and push dist repo
        run: |
          cd dist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release ${{ github.ref_name }}"
          git push
